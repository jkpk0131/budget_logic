<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Budget">
  <meta name="theme-color" content="#0D0D14">
  <link rel="manifest" href="manifest.json">
  <title>Monthly Budget</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0D0D14;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;color:#fff;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
    #app{height:100%}
    input,select,button,textarea{font-family:inherit}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.4)}
    ::-webkit-scrollbar{display:none}

    .screen{height:100%;overflow-y:auto;overflow-x:hidden;padding-bottom:100px}
    .px{padding-left:22px;padding-right:22px}

    /* Tab bar */
    .tab-bar{position:fixed;bottom:0;left:0;right:0;height:82px;background:rgba(13,13,20,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom,14px);z-index:100}
    .tab-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;opacity:.3;transition:opacity .2s;padding:6px 18px;background:none;border:none;color:#fff}
    .tab-item.active{opacity:1}
    .tab-label{font-size:10px;font-weight:500;letter-spacing:.03em}
    .add-btn{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#8B6FFF,#6040DF);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(139,111,255,.5);margin-top:-12px;flex-shrink:0}

    /* Cards */
    .card{background:#161622;border-radius:20px;padding:20px}
    .card-row{display:flex;align-items:center;padding:17px 20px;border-bottom:1px solid rgba(255,255,255,.04)}
    .card-row:last-child{border-bottom:none}

    /* Section */
    .section{margin-bottom:32px}
    .section-label{font-size:11px;color:#555;font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}

    /* Inputs */
    .inp{width:100%;background:#0D0D14;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:15px 18px;color:#fff;font-size:15px;outline:none;transition:border-color .2s}
    .inp:focus{border-color:rgba(139,111,255,.5)}
    .inp::placeholder{color:#3A3A4A}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end}
    .modal-sheet{background:#161622;border-radius:28px 28px 0 0;width:100%;padding:20px 22px calc(env(safe-area-inset-bottom,0px) + 28px);max-height:90vh;overflow-y:auto}
    .drag-handle{width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto 24px}

    /* Pill */
    .pill{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:30px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#fff}

    /* Transaction row */
    .txn-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .txn-row:last-child{border-bottom:none}
    .txn-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

    /* Buttons */
    .btn-primary{width:100%;background:linear-gradient(135deg,#8B6FFF,#6040DF);border:none;border-radius:16px;padding:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:-.01em}
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10.19.6';
import { useState, useEffect, useRef, useCallback } from 'https://esm.sh/preact@10.19.6/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, onSnapshot, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import {
  LayoutDashboard, ClipboardList, Settings, Plus,
  Wallet, PiggyBank, Gamepad2, CreditCard,
  Coffee, UtensilsCrossed, Bus, ShoppingBag, Store,
  Trash2, Check, X, Calendar
} from 'https://esm.sh/lucide-preact@0.383.0';

const html = htm.bind(h);

// ── Firebase ──────────────────────────────────────────────
const fbApp = initializeApp({
  apiKey:"AIzaSyCnGFsmqxSTy9xr_VkN6GP_vLz4rSli9wI",
  authDomain:"budget-logic.firebaseapp.com",
  projectId:"budget-logic",
  storageBucket:"budget-logic.firebasestorage.app",
  messagingSenderId:"119487307408",
  appId:"1:119487307408:web:ba4492fb4409a468490215"
});
const db  = getFirestore(fbApp);
const DOC = doc(db,'budget','main');

// ── Helpers ───────────────────────────────────────────────
const fmt   = n => `$${Math.abs(n).toFixed(2)}`;
const fmtSm = n => n>=1000?`$${(n/1000).toFixed(1)}k`:fmt(n);

function localDateKey(d=new Date()){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getTime(){return new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});}
function getDaysLeft(end){
  return Math.max(0,Math.ceil((new Date(end+'T00:00:00')-new Date(localDateKey()+'T00:00:00'))/86400000)+1);
}
function derivePools(txns,cfg){
  if(!cfg)return{spendPool:0,bufferPool:0,savingsPool:0};
  const today=localDateKey(),spd={};
  txns.forEach(t=>{if(t.pool==='spend')spd[t.date]=parseFloat(((spd[t.date]||0)+t.amount).toFixed(2));});
  let sp=cfg.initialSpend,sav=0;
  let cur=new Date(cfg.startDate+'T00:00:00'),tod=new Date(today+'T00:00:00');
  while(cur<=tod){
    const dk=localDateKey(cur),isT=dk===today,ds=spd[dk]||0;
    sp=parseFloat((sp-ds).toFixed(2));
    if(!isT){const s=parseFloat(Math.max(0,cfg.dailyCap-ds).toFixed(2));sp=parseFloat((sp-s).toFixed(2));sav=parseFloat((sav+s).toFixed(2));}
    cur.setDate(cur.getDate()+1);
  }
  let bp=cfg.initialBuffer,ov=0;
  [...txns].filter(t=>t.pool==='buffer').sort((a,b)=>a.id-b.id).forEach(t=>{
    if(bp>=t.amount)bp=parseFloat((bp-t.amount).toFixed(2));
    else{ov=parseFloat((ov+t.amount-bp).toFixed(2));bp=0;}
  });
  return{spendPool:parseFloat((sp-ov).toFixed(2)),bufferPool:bp,savingsPool:sav};
}
function getTxnIcon(label='',pool){
  const l=label.toLowerCase();
  if(l.includes('coffee')||l.includes('커피')||l.includes('latte'))return Coffee;
  if(l.includes('food')||l.includes('meal')||l.includes('lunch')||l.includes('dinner')||l.includes('chicken')||l.includes('치킨')||l.includes('맥날')||l.includes('pizza')||l.includes('밥'))return UtensilsCrossed;
  if(l.includes('store')||l.includes('편의점')||l.includes('mart')||l.includes('gs')||l.includes('7-'))return Store;
  if(l.includes('shop')||l.includes('쇼핑')||l.includes('cloth'))return ShoppingBag;
  if(l.includes('transit')||l.includes('bus')||l.includes('subway')||l.includes('교통')||l.includes('uber')||l.includes('taxi'))return Bus;
  return pool==='buffer'?Gamepad2:CreditCard;
}

// ── Ring SVG ──────────────────────────────────────────────
function Ring({pct,color,size=72,stroke=4.5,Icon}){
  const r=size/2-stroke-2,circ=2*Math.PI*r,dash=Math.max(0,Math.min(1,pct))*circ;
  return html`
    <svg width=${size} height=${size} viewBox="0 0 ${size} ${size}">
      <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke="rgba(255,255,255,.06)" stroke-width=${stroke} />
      <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${color} stroke-width=${stroke}
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dasharray .6s" />
      ${Icon&&html`<foreignObject x=${size/2-9} y=${size/2-9} width="18" height="18">
        <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;width:18px;height:18px">
          <${Icon} size=${13} color=${color} />
        </div>
      </foreignObject>`}
    </svg>`;
}

function PoolCard({label,value,initial,color,Icon}){
  const pct=initial>0?Math.max(0,value/initial):0;
  return html`
    <div class="card" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:12px;padding:22px 12px">
      <${Ring} pct=${pct} color=${color} size=${76} stroke=${4.5} Icon=${Icon} />
      <div style="text-align:center">
        <div style="font-size:17px;font-weight:800;letter-spacing:-.02em">${fmtSm(value)}</div>
        <div style="font-size:10px;color:#555;font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-top:3px">${label}</div>
      </div>
    </div>`;
}

// ── Home Screen ───────────────────────────────────────────
function HomeScreen({cfg,txns}){
  const today=localDateKey();
  const {spendPool,bufferPool,savingsPool}=derivePools(txns,cfg);
  const daysLeft=getDaysLeft(cfg.endDate);
  const todayT=txns.filter(t=>t.date===today);
  const todaySpend=todayT.filter(t=>t.pool==='spend').reduce((s,t)=>s+t.amount,0);
  const capLeft=parseFloat((cfg.dailyCap-todaySpend).toFixed(2));
  const spentFrac=Math.min(1,todaySpend/cfg.dailyCap);
  const capColor=capLeft<0?'#FF5A5A':capLeft<5?'#F5B800':'#22D3A5';

  return html`
    <div class="screen">
      <div style="padding:calc(env(safe-area-inset-top,44px)+16px) 22px 0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
          <div>
            <div style="font-size:12px;color:#555;margin-bottom:3px">${cfg.startDate} – ${cfg.endDate}</div>
            <div style="font-size:20px;font-weight:800;letter-spacing:-.02em">Overview</div>
          </div>
          <div style="display:flex;align-items:center;gap:5px;background:rgba(139,111,255,.14);padding:6px 13px;border-radius:20px">
            <${Calendar} size=${12} color="#8B6FFF" />
            <span style="font-size:12px;color:#8B6FFF;font-weight:600">D-${daysLeft}</span>
          </div>
        </div>
      </div>

      <!-- Hero card -->
      <div class="px" style="margin-bottom:14px">
        <div class="card" style="background:linear-gradient(145deg,#1C1430,#161228);border:1px solid rgba(139,111,255,.16)">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px">
            <${Wallet} size=${12} color="#8B6FFF" />
            <span style="font-size:11px;color:#8B6FFF;font-weight:600;letter-spacing:.1em;text-transform:uppercase">Spend Pool</span>
          </div>
          <div style="font-size:46px;font-weight:900;letter-spacing:-.04em;line-height:1;margin-bottom:10px">${fmt(spendPool)}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
            <span style="font-size:13px;color:#666">${fmt(todaySpend)} today</span>
            <span style="width:3px;height:3px;border-radius:50%;background:#333;flex-shrink:0"></span>
            <span style="font-size:13px;font-weight:600;color:${capColor}">${fmt(Math.abs(capLeft))} ${capLeft<0?'over':'left today'}</span>
          </div>
          <div style="height:4px;background:rgba(255,255,255,.07);border-radius:10px;overflow:hidden">
            <div style="height:100%;width:${spentFrac*100}%;background:linear-gradient(90deg,#8B6FFF,#6040DF);border-radius:10px;transition:width .5s"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:8px">
            <span style="font-size:11px;color:#444">$0</span>
            <span style="font-size:11px;color:#444">${fmt(cfg.dailyCap)}/day</span>
          </div>
        </div>
      </div>

      <!-- Pool rings -->
      <div class="px" style="display:flex;gap:12px;margin-bottom:28px">
        <${PoolCard} label="Buffer" value=${bufferPool} initial=${cfg.initialBuffer} color="#FF8A3D" Icon=${Gamepad2} />
        <${PoolCard} label="Savings" value=${savingsPool} initial=${Math.max(1,cfg.dailyCap*20)} color="#22D3A5" Icon=${PiggyBank} />
      </div>

      <!-- Today -->
      <div class="px">
        <div class="section-label">Today</div>
        <div class="card" style="padding:0 20px">
          ${todayT.length===0?html`
            <div style="padding:28px 0;text-align:center;color:#444;font-size:13px">No expenses today</div>`:
            todayT.map(t=>{
              const Ic=getTxnIcon(t.label,t.pool);
              const col=t.pool==='buffer'?'#FF8A3D':'#8B6FFF';
              const bg=t.pool==='buffer'?'rgba(255,138,61,.12)':'rgba(139,111,255,.12)';
              return html`
                <div class="txn-row" key=${t.id}>
                  <div class="txn-icon" style="background:${bg}"><${Ic} size=${18} color=${col} /></div>
                  <div style="flex:1">
                    <div style="font-size:14px;font-weight:600">${t.label}</div>
                    <div style="font-size:11px;color:#555;margin-top:2px">${t.pool==='buffer'?'Buffer':'Spend'} · ${t.time||''}</div>
                  </div>
                  <div style="font-size:15px;font-weight:700;color:${col}">−${fmt(t.amount)}</div>
                </div>`;})}
        </div>
      </div>
    </div>`;
}

// ── Records Screen ────────────────────────────────────────
function RecordsScreen({txns,onDelete}){
  const today=localDateKey();
  const grouped={};
  txns.forEach(t=>{if(!grouped[t.date])grouped[t.date]=[];grouped[t.date].push(t);});
  const dates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  return html`
    <div class="screen">
      <div style="padding:calc(env(safe-area-inset-top,44px)+16px) 22px 24px">
        <div style="font-size:26px;font-weight:800;letter-spacing:-.02em">Records</div>
      </div>
      ${txns.length===0?html`
        <div class="px" style="padding-top:60px;text-align:center;color:#444;font-size:14px">No transactions yet</div>`:
        dates.map(date=>html`
          <div key=${date} class="px" style="margin-bottom:24px">
            <div style="font-size:12px;color:#555;font-weight:500;margin-bottom:10px;letter-spacing:.04em">${date===today?'Today':date}</div>
            <div class="card" style="padding:0 20px">
              ${grouped[date].map(t=>{
                const Ic=getTxnIcon(t.label,t.pool);
                const col=t.pool==='buffer'?'#FF8A3D':'#8B6FFF';
                const bg=t.pool==='buffer'?'rgba(255,138,61,.12)':'rgba(139,111,255,.12)';
                return html`
                  <div class="txn-row" key=${t.id}>
                    <div class="txn-icon" style="background:${bg}"><${Ic} size=${18} color=${col} /></div>
                    <div style="flex:1">
                      <div style="font-size:14px;font-weight:600">${t.label}</div>
                      <div style="font-size:11px;color:#555;margin-top:2px">${t.pool==='buffer'?'Buffer':'Spend'}${t.time?` · ${t.time}`:''}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px">
                      <div style="font-size:15px;font-weight:700;color:${col}">−${fmt(t.amount)}</div>
                      <button onClick=${()=>onDelete(t)}
                        style="background:rgba(255,255,255,.05);border:none;border-radius:8px;padding:7px;cursor:pointer;display:flex;color:#555">
                        <${X} size=${14} />
                      </button>
                    </div>
                  </div>`;})}
            </div>
          </div>`)}
    </div>`;
}

// ── Settings Screen ───────────────────────────────────────
function SettingsScreen({cfg,onReset}){
  return html`
    <div class="screen">
      <div style="padding:calc(env(safe-area-inset-top,44px)+16px) 22px 24px">
        <div style="font-size:26px;font-weight:800;letter-spacing:-.02em">Settings</div>
      </div>
      <div class="px">
        <div class="section-label">Budget</div>
        <div class="card" style="padding:0;margin-bottom:28px">
          ${[['Period',`${cfg.startDate} – ${cfg.endDate}`],['Daily limit',fmt(cfg.dailyCap)],['Spend pool',fmt(cfg.initialSpend)],['Buffer',fmt(cfg.initialBuffer)]].map(([k,v])=>html`
            <div class="card-row">
              <span style="font-size:14px;color:#888">${k}</span>
              <span style="font-size:14px;font-weight:600;margin-left:auto">${v}</span>
            </div>`)}
        </div>

        <div class="section-label">Sync</div>
        <div class="card" style="margin-bottom:28px;display:flex;align-items:center;gap:12px">
          <div style="width:34px;height:34px;border-radius:10px;background:rgba(34,211,165,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <${Check} size=${16} color="#22D3A5" />
          </div>
          <div>
            <div style="font-size:14px;font-weight:600">Firebase Sync</div>
            <div style="font-size:12px;color:#555;margin-top:2px">Real-time sync across devices</div>
          </div>
        </div>

        <button onClick=${onReset}
          style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,90,90,.08);border:1px solid rgba(255,90,90,.18);border-radius:16px;padding:16px;color:#FF5A5A;font-size:14px;cursor:pointer;font-weight:600">
          <${Trash2} size=${15} />Reset All Data
        </button>
      </div>
    </div>`;
}

// ── Add Sheet ─────────────────────────────────────────────
function AddSheet({cfg,onAdd,onClose}){
  const today=localDateKey();
  const [label,setLabel]=useState('');
  const [amount,setAmount]=useState('');
  const [pool,setPool]=useState('spend');
  const [date,setDate]=useState(today);
  const go=()=>{
    if(!label.trim()||!amount||isNaN(parseFloat(amount)))return;
    onAdd(label.trim(),parseFloat(amount),pool,date);
    onClose();
  };
  return html`
    <div class="modal-overlay" onClick=${e=>{if(e.target===e.currentTarget)onClose();}}>
      <div class="modal-sheet">
        <div class="drag-handle"></div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">
          <${Plus} size=${18} color="#8B6FFF" />
          <span style="font-size:18px;font-weight:800">Add Expense</span>
        </div>

        ${cfg?.shortcuts?.length?html`
          <div style="margin-bottom:24px">
            <div style="font-size:11px;color:#555;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Quick Add</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px">
              ${cfg.shortcuts.map((q,i)=>{
                const Ic=getTxnIcon(q.label,q.pool);
                const col=q.pool==='buffer'?'#FF8A3D':'#8B6FFF';
                const bg=q.pool==='buffer'?'rgba(255,138,61,.14)':'rgba(139,111,255,.14)';
                return html`
                  <button key=${i} class="pill" onClick=${()=>{onAdd(q.label,q.amount,q.pool,today);onClose();}}
                    style="background:${bg};color:${col}">
                    <${Ic} size=${14} color=${col} />${q.label} ${fmt(q.amount)}
                  </button>`;
              })}
            </div>
          </div>`:null}

        <div style="font-size:11px;color:#555;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Manual</div>
        <input class="inp" placeholder="Label" value=${label} onInput=${e=>setLabel(e.target.value)}
          onKeyDown=${e=>e.key==='Enter'&&go()} style="margin-bottom:10px" />
        <div style="display:flex;gap:10px;margin-bottom:10px">
          <input class="inp" type="number" placeholder="Amount" value=${amount}
            onInput=${e=>setAmount(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&go()} style="flex:1" />
          <select class="inp" value=${pool} onChange=${e=>setPool(e.target.value)} style="flex:1">
            <option value="spend">Spend</option>
            <option value="buffer">Buffer</option>
          </select>
        </div>
        <div style="position:relative;margin-bottom:${date!==today?'8px':'24px'}">
          <input class="inp" type="date" value=${date} onInput=${e=>setDate(e.target.value)}
            min=${cfg?.startDate} max=${today}
            style="padding-left:42px;border-color:${date!==today?'rgba(255,138,61,.4)':'rgba(255,255,255,.07)'}" />
          <div style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none">
            <${Calendar} size=${15} color="${date!==today?'#FF8A3D':'#555'}" />
          </div>
        </div>
        ${date!==today?html`
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:20px">
            <${Calendar} size=${11} color="#FF8A3D" />
            <span style="font-size:11px;color:#FF8A3D">Recording for a past date</span>
          </div>`:null}
        <button class="btn-primary" onClick=${go}>Save</button>
      </div>
    </div>`;
}

// ── Setup Screen ──────────────────────────────────────────
function SetupScreen({onSave}){
  const today=localDateKey();
  const [form,setForm]=useState({
    startDate:today,endDate:'',dailyCap:'15',initialSpend:'',initialBuffer:'',
    shortcuts:[{label:'Coffee',amount:'2.81',pool:'spend'},{label:'Chicken',amount:'27',pool:'buffer'}]
  });
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const setS=(i,k,v)=>{const s=[...form.shortcuts];s[i]={...s[i],[k]:v};setForm(p=>({...p,shortcuts:s}));};
  const save=()=>{
    if(!form.startDate||!form.endDate||!form.dailyCap||!form.initialSpend||!form.initialBuffer)
      return alert('Please fill in all fields.');
    onSave({startDate:form.startDate,endDate:form.endDate,dailyCap:parseFloat(form.dailyCap),
      initialSpend:parseFloat(form.initialSpend),initialBuffer:parseFloat(form.initialBuffer),
      shortcuts:form.shortcuts.filter(s=>s.label&&s.amount).map(s=>({...s,amount:parseFloat(s.amount)}))});
  };

  return html`
    <div style="height:100vh;overflow-y:auto;padding:calc(env(safe-area-inset-top,44px)+24px) 24px 60px">

      <!-- Title -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <${Wallet} size=${14} color="#8B6FFF" />
        <span style="font-size:11px;color:#8B6FFF;font-weight:600;letter-spacing:.12em;text-transform:uppercase">Monthly Budget</span>
      </div>
      <div style="font-size:32px;font-weight:900;letter-spacing:-.03em;margin-bottom:6px">Budget Setup</div>
      <div style="font-size:14px;color:#555;margin-bottom:44px">Configure your spending period</div>

      <!-- Period -->
      <div class="section">
        <div class="section-label">Period</div>
        <div class="card" style="padding:0">
          <div class="card-row">
            <span style="font-size:14px;color:#666;width:54px;flex-shrink:0">Start</span>
            <input type="date" value=${form.startDate} onInput=${e=>set('startDate',e.target.value)}
              style="flex:1;background:none;border:none;padding:0;color:#fff;font-size:15px;outline:none;text-align:right" />
          </div>
          <div class="card-row">
            <span style="font-size:14px;color:#666;width:54px;flex-shrink:0">End</span>
            <input type="date" value=${form.endDate} min=${form.startDate} onInput=${e=>set('endDate',e.target.value)}
              style="flex:1;background:none;border:none;padding:0;color:#fff;font-size:15px;outline:none;text-align:right" />
          </div>
        </div>
      </div>

      <!-- Amounts -->
      <div class="section">
        <div class="section-label">Amounts</div>
        <div class="card" style="padding:0">
          ${[['Daily limit','dailyCap','15'],['Spend pool','initialSpend','420'],['Buffer','initialBuffer','210']].map(([lbl,key,ph],i)=>html`
            <div key=${key} class="card-row">
              <span style="font-size:14px;color:#666">${lbl}</span>
              <div style="display:flex;align-items:center;gap:4px;margin-left:auto">
                <span style="font-size:14px;color:#555">$</span>
                <input type="number" placeholder=${ph} value=${form[key]} onInput=${e=>set(key,e.target.value)}
                  style="background:none;border:none;padding:0;color:#fff;font-size:15px;font-weight:600;outline:none;text-align:right;width:80px" />
              </div>
            </div>`)}
        </div>
      </div>

      <!-- Shortcuts -->
      <div class="section">
        <div class="section-label">Quick Shortcuts</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${form.shortcuts.map((s,i)=>html`
            <div key=${i} class="card" style="padding:14px 16px;display:flex;gap:8px;align-items:center">
              <input placeholder="Name" value=${s.label} onInput=${e=>setS(i,'label',e.target.value)}
                style="flex:2;background:none;border:none;color:#fff;font-size:14px;outline:none;min-width:0" />
              <div style="width:1px;height:20px;background:rgba(255,255,255,.07);flex-shrink:0"></div>
              <div style="display:flex;align-items:center;gap:4px">
                <span style="font-size:13px;color:#555">$</span>
                <input type="number" placeholder="0.00" value=${s.amount} onInput=${e=>setS(i,'amount',e.target.value)}
                  style="width:60px;background:none;border:none;color:#fff;font-size:14px;font-weight:600;outline:none;text-align:right" />
              </div>
              <div style="width:1px;height:20px;background:rgba(255,255,255,.07);flex-shrink:0"></div>
              <select value=${s.pool} onChange=${e=>setS(i,'pool',e.target.value)}
                style="background:none;border:none;color:#888;font-size:13px;outline:none;flex-shrink:0">
                <option value="spend">Spend</option><option value="buffer">Buffer</option>
              </select>
              <button onClick=${()=>setForm(p=>({...p,shortcuts:p.shortcuts.filter((_,j)=>j!==i)}))}
                style="background:none;border:none;padding:4px;color:#444;cursor:pointer;display:flex;flex-shrink:0">
                <${X} size=${15} />
              </button>
            </div>`)}
          <button onClick=${()=>setForm(p=>({...p,shortcuts:[...p.shortcuts,{label:'',amount:'',pool:'spend'}]}))}
            style="background:none;border:1px dashed rgba(255,255,255,.1);border-radius:16px;padding:14px;color:#555;cursor:pointer;font-size:13px;width:100%">
            + Add Shortcut
          </button>
        </div>
      </div>

      <button class="btn-primary" onClick=${save}>Get Started</button>
    </div>`;
}

// ── Root App ──────────────────────────────────────────────
function App(){
  const [cfg,setCfg]=useState(null);
  const [txns,setTxnsRaw]=useState([]);
  const [tab,setTab]=useState(0);
  const [showAdd,setShowAdd]=useState(false);
  const [loaded,setLoaded]=useState(false);
  const [toast,setToast]=useState(null);
  const skipNext=useRef(false);

  useEffect(()=>{
    const unsub=onSnapshot(DOC,snap=>{
      if(snap.exists()){const d=snap.data();skipNext.current=true;setCfg(d.config||null);setTxnsRaw(d.transactions||[]);}
      setLoaded(true);
    },()=>setLoaded(true));
    return unsub;
  },[]);

  const flash=msg=>{setToast(msg);setTimeout(()=>setToast(null),2400);};
  const save=useCallback(async(nc,nt)=>{
    if(skipNext.current){skipNext.current=false;return;}
    try{await setDoc(DOC,{config:nc,transactions:nt});}catch(e){}
  },[]);
  const saveCfg=nc=>{setCfg(nc);save(nc,txns);};
  const setTxns=useCallback(fn=>{
    setTxnsRaw(prev=>{const next=typeof fn==='function'?fn(prev):fn;save(cfg,next);return next;});
  },[cfg,save]);
  const addTxn=(lbl,amt,pool,date)=>{
    const today=localDateKey();
    const txn={id:Date.now(),date,time:date===today?getTime():'',label:lbl,amount:parseFloat(parseFloat(amt).toFixed(2)),pool};
    setTxns(prev=>[...prev,txn].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id));
    flash(`Saved · ${lbl} ${fmt(txn.amount)}`);
  };
  const delTxn=txn=>{setTxns(prev=>prev.filter(t=>t.id!==txn.id));flash(`Removed · ${txn.label}`);};
  const reset=()=>{if(!window.confirm('Delete all data?'))return;setCfg(null);setTxnsRaw([]);save(null,[]);};

  if(!loaded)return html`
    <div style="background:#0D0D14;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
      <${Wallet} size=${30} color="#8B6FFF" />
      <div style="font-size:13px;color:#444;letter-spacing:.04em">Syncing...</div>
    </div>`;

  if(!cfg)return html`<${SetupScreen} onSave=${saveCfg} />`;

  const tabs=[
    {Icon:LayoutDashboard,label:'Home',id:0},
    {Icon:ClipboardList,label:'Records',id:1},
    null,
    {Icon:Settings,label:'Settings',id:3},
  ];

  return html`
    <div style="height:100vh;background:#0D0D14">
      ${tab===0&&html`<${HomeScreen} cfg=${cfg} txns=${txns} />`}
      ${tab===1&&html`<${RecordsScreen} txns=${txns} onDelete=${delTxn} />`}
      ${tab===3&&html`<${SettingsScreen} cfg=${cfg} onReset=${reset} />`}

      <div class="tab-bar">
        ${tabs.map((t,i)=>t===null?html`
          <button class="add-btn" onClick=${()=>setShowAdd(true)} key="add">
            <${Plus} size=${22} color="#fff" />
          </button>`:html`
          <button key=${t.id} class="tab-item ${tab===t.id?'active':''}" onClick=${()=>setTab(t.id)}>
            <${t.Icon} size=${21} />
            <span class="tab-label">${t.label}</span>
          </button>`)}
      </div>

      ${showAdd&&html`<${AddSheet} cfg=${cfg} onAdd=${addTxn} onClose=${()=>setShowAdd(false)} />`}

      ${toast&&html`
        <div style="position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,.96);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:10px 18px;font-size:13px;white-space:nowrap;z-index:300;display:flex;align-items:center;gap:7px">
          <${Check} size=${13} color="#22D3A5" />${toast}
        </div>`}
    </div>`;
}

render(html`<${App} />`, document.getElementById('app'));
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
